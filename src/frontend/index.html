<!-- src/frontend/index.html -->
<!DOCTYPE html>
<html lang="en" :class="{ 'dark': isDark }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoGet</title>
    <script src="/vendor/vue.global.prod.js"></script>
    <script src="/vendor/tailwindcss-browser.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="/i18n.js"></script>
</head>
<body class="antialiased min-h-screen font-sans selection:bg-accent selection:text-white">
    <div id="app" class="max-w-6xl mx-auto p-4 md:p-6 flex flex-col h-screen">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-6 pb-4 shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold text-text-color tracking-wide flex items-center gap-2">
                    <i class="fas fa-bolt text-accent"></i> OctoGet
                </h1>
                <div class="hidden md:flex items-center gap-2 text-xs px-3 py-1 rounded-full bg-item border border-border-color">
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-success opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-success"></span>
                    </span>
                    <span class="text-success font-bold">{{ t('sysOnline') }}</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button @click="openNewTaskModal" class="bg-accent text-white px-4 py-2 rounded-md font-bold hover:bg-accent-hover transition-colors flex items-center gap-2 text-sm shadow-lg shadow-accent/20">
                    <i class="fas fa-plus"></i> <span class="hidden sm:inline">{{ t('newTask') }}</span>
                </button>
                <button @click="openShareModal" class="p-2 rounded-md border border-border-color hover:border-accent transition-colors text-sm w-10 h-10 flex items-center justify-center text-text-muted hover:text-accent" :title="t('shareNode')">
                    <i class="fas fa-share-nodes text-lg"></i>
                </button>
                <button @click="openSettingsModal" class="p-2 rounded-md border border-border-color hover:border-accent transition-colors text-sm w-10 h-10 flex items-center justify-center text-text-muted hover:text-accent" :title="t('settings')">
                    <i class="fas fa-cog text-lg"></i>
                </button>
                <button @click="toggleLang" class="p-2 rounded-md border border-border-color hover:border-accent transition-colors text-sm w-10 h-10 flex items-center justify-center text-text-muted hover:text-accent" :title="t('language')">
                    <i class="fas fa-language text-lg"></i>
                </button>
                <button @click="toggleTheme" class="p-2 rounded-md border border-border-color hover:border-accent transition-colors text-sm w-10 h-10 flex items-center justify-center text-text-muted hover:text-accent" :title="t('theme')">
                    <i class="fas" :class="isDark ? 'fa-sun' : 'fa-moon'"></i>
                </button>
            </div>
        </header>

        <!-- Navigation Tabs & Batch Actions -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4 shrink-0">
            <nav class="flex gap-6 border-b border-border-color w-full md:w-auto">
                <button @click="activeTab = 'downloading'" class="pb-2 px-1 transition-all flex items-center gap-2" :class="activeTab === 'downloading' ? 'tab-active' : 'text-muted hover:text-text-color'">
                    <i class="fas fa-download"></i> {{ t('downloading') }} ({{ activeTasks.length }})
                </button>
                <button @click="activeTab = 'completed'" class="pb-2 px-1 transition-all flex items-center gap-2" :class="activeTab === 'completed' ? 'tab-active' : 'text-muted hover:text-text-color'">
                    <i class="fas fa-check-circle"></i> {{ t('completed') }} ({{ completedTasks.length }})
                </button>
                <button @click="activeTab = 'network'" class="pb-2 px-1 transition-all flex items-center gap-2" :class="activeTab === 'network' ? 'tab-active' : 'text-muted hover:text-text-color'">
                    <i class="fas fa-network-wired"></i> {{ t('networkNodes') }} ({{ peers.length }})
                </button>
            </nav>
            
            <div v-if="activeTab === 'downloading' && activeTasks.length > 0" class="flex items-center gap-3 px-4 py-2 w-full md:w-auto">
                <label class="flex items-center gap-2 cursor-pointer text-sm text-text-color font-medium mr-2">
                    <input type="checkbox" class="custom-checkbox" :checked="selectedTasks.length === activeTasks.length && activeTasks.length > 0" @change="toggleSelectAll">
                    {{ t('selectAll') }}
                </label>
                <button @click="batchAction('pauseResume')" class="px-3 py-1.5 rounded-md btn-outline text-xs font-medium transition-colors" :disabled="selectedTasks.length === 0" :class="{'opacity-50 cursor-not-allowed': selectedTasks.length === 0}">
                    {{ getBatchPauseResumeAction() === 'resume' ? t('resume') : t('pause') }}
                </button>
                <button @click="batchAction('delete')" class="px-3 py-1.5 rounded-md bg-accent text-white hover:bg-accent-hover text-xs font-medium transition-colors" :disabled="selectedTasks.length === 0" :class="{'opacity-50 cursor-not-allowed': selectedTasks.length === 0}">
                    {{ t('delete') }}
                </button>
            </div>
            
            <div v-if="activeTab === 'completed' && completedTasks.length > 0" class="flex items-center gap-3 px-4 py-2 w-full md:w-auto">
                <button @click="batchAction('deleteAllCompleted')" class="px-3 py-1.5 rounded-md bg-danger text-white hover:bg-danger-hover text-xs font-medium transition-colors">
                    {{ t('clearHistory') }}
                </button>
            </div>
            
            <div v-if="activeTab === 'network'" class="flex items-center gap-3 px-4 py-2 w-full md:w-auto">
                <button @click="openAddPeerModal" class="px-3 py-1.5 rounded-md bg-danger text-white hover:bg-danger-hover text-xs font-medium transition-colors">
                    <i class="fas fa-plus"></i> {{ t('addPeer') }}
                </button>
            </div>
        </div>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-hidden flex flex-col">
            <!-- INJECT_TASK_LIST -->
            <!-- INJECT_NETWORK -->
        </main>

        <!-- INJECT_MODALS -->

        <!-- Toast Container -->
        <div class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
            <transition-group name="toast">
                <div v-for="toast in toasts" :key="toast.id" class="px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 text-sm font-medium pointer-events-auto max-w-sm" :class="toast.type === 'error' ? 'bg-danger text-white' : (toast.type === 'success' ? 'bg-success text-white' : 'bg-panel text-text-color border border-border-color')">
                    <i class="fas" :class="toast.type === 'error' ? 'fa-exclamation-circle' : (toast.type === 'success' ? 'fa-check-circle' : 'fa-info-circle')"></i>
                    <span class="break-words">{{ toast.message }}</span>
                </div>
            </transition-group>
        </div>

    </div>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: 'var(--bg-color)', panel: 'var(--panel-color)', border: 'var(--border-color)',
                        text: 'var(--text-color)', muted: 'var(--text-muted)', accent: 'var(--accent)',
                        'accent-hover': 'var(--accent-hover)', danger: 'var(--danger)', 'danger-hover': 'var(--danger-hover)',
                        success: 'var(--success)', warning: 'var(--warning)', item: 'var(--item-bg)', 'item-hover': 'var(--item-hover)',
                    },
                    fontFamily: { sans:['Inter', 'system-ui', 'sans-serif'], mono: ['"Fira Code"', 'monospace'] }
                }
            }
        }
    </script>
    <script src="/app.js"></script>
</body>
</html>
